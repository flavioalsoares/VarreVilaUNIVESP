services:
  - type: web
    name: varre-vila
    runtime: python
    region: ohio
    plan: free
    buildCommand: "./build.sh"
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: varre-vila-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings_production
      - key: PYTHON_VERSION
        value: "3.11.0"

databases:
  - name: varre-vila-db
    plan: free
    region: ohio
