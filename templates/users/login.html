{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Entrar – {{ INST_NOME }}{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-5">
        <div class="card p-4">
            <div class="text-center mb-4">
                {% load static %}
                <img src="{% static 'img/logo-varrevila.png' %}" alt="{{ INST_NOME }}" class="auth-logo mb-3">
                <h3 class="fw-bold" style="color:var(--verde-escuro)">{{ INST_NOME }}</h3>
                <p class="text-muted">{{ INST_SLOGAN }}</p>
            </div>
            <h5 class="mb-3">Entrar no sistema</h5>
            {% crispy form %}
            <hr>
            <div class="text-center">
                <small>Ainda não tem conta?
                    <a href="{% url 'users:cadastro' %}" class="text-success">Cadastre-se aqui</a>
                </small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
