{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Cadastro – {{ INST_NOME }}{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-7">
        <div class="card p-4">
            <div class="text-center mb-4">
                {% load static %}
                <img src="{% static 'img/logo-varrevila.png' %}" alt="{{ INST_NOME }}" class="auth-logo mb-3">
                <h4 class="fw-bold" style="color:var(--verde-escuro)">Junte-se ao {{ INST_NOME }}</h4>
                <p class="text-muted">Cadastre-se para participar dos mutirões de limpeza</p>
            </div>
            {% crispy form %}
            <hr>
            <div class="text-center">
                <small>Já tem conta?
                    <a href="{% url 'users:login' %}" class="text-success">Entre aqui</a>
                </small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
