{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}{{ titulo }} – {{ INST_NOME }}{% endblock %}

{% block content %}
<div class="mb-3">
    <a href="{% url 'events:lista' %}" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left"></i> Voltar
    </a>
</div>

<div class="page-header">
    <h2><i class="bi bi-calendar-plus"></i> {{ titulo }}</h2>
</div>

<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card p-4">
            {% crispy form %}
        </div>
    </div>
</div>
{% endblock %}
